name: CI/CD — E2E Tests & Deploy to Neon

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  ENVIRONMENT: production
  PORT: "8000"
  DB_HOST: ${{ secrets.DB_HOST }}
  DB_PORT: ${{ secrets.DB_PORT }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_NAME: ${{ secrets.DB_NAME }}
  REDIS_HOST: ${{ secrets.REDIS_HOST }}
  REDIS_PORT: ${{ secrets.REDIS_PORT }}
  REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
  REDIS_TLS: ${{ secrets.REDIS_TLS }}
  REDIS_DB: ${{ secrets.REDIS_DB }}
  API_KEYS: ${{ secrets.API_KEYS }}
  PROXY_URL: ${{ secrets.PROXY_URL }}
  PROXY_SECRET: ${{ secrets.PROXY_SECRET }}

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install --no-cache-dir ".[dev]"

      - name: Run E2E tests
        run: python -m pytest tests/e2e/ -v --tb=short --timeout=300

  deploy-neon:
    name: Deploy to Neon (migrations)
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install --no-cache-dir .

      - name: Validate schema against Neon
        run: python -m src.shared.infra.persistence.validate_schema

      - name: Run Alembic migrations
        run: python -m alembic upgrade head

      - name: Verify deployment
        run: |
          python -c "
          from sqlalchemy import create_engine, inspect, text
          from src.shared.infra.env.env_service import env_service
          engine = create_engine(env_service.sync_database_url)
          inspector = inspect(engine)
          tables = inspector.get_table_names()
          print(f'Neon tables: {tables}')
          assert len(tables) >= 7, f'Expected at least 7 tables, got {len(tables)}'
          with engine.connect() as conn:
              result = conn.execute(text('SELECT count(*) FROM information_schema.columns WHERE table_name = \'funds\' AND column_name = \'fund_type\''))
              assert result.scalar() == 1, 'fund_type column missing'
          print('Neon deployment verified successfully')
          "
